<svg xmlns="http://www.w3.org/2000/svg" width="370" height="430" viewBox="0 0 370 430" role="img" aria-labelledby="title desc">
<title id="title">Animated ASCII portrait of Nihaal N O</title>
<desc id="desc">A monochrome terminal-style portrait drawn one row at a time.</desc>
<style>
  .bg { fill: #0d1117; }
  .frame { fill: none; stroke: #30363d; }
  .bar { fill: #161b22; }
  .row { fill: #c9d1d9; font: 7.2px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space: pre; opacity: 0; animation: reveal 4.50s linear infinite; }
  .prompt { fill: #58a6ff; font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  @keyframes reveal { 0%, 5% { opacity: 0; } 8%, 86% { opacity: 1; } 94%, 100% { opacity: 0; } }
</style>
<rect class="bg" width="100%" height="100%" rx="12"/>
<rect class="frame" x=".5" y=".5" width="369" height="429" rx="11.5"/>
<rect class="bar" x="1" y="1" width="368" height="26" rx="11"/>
<circle cx="15" cy="14" r="4" fill="#f85149"/><circle cx="28" cy="14" r="4" fill="#d29922"/><circle cx="41" cy="14" r="4" fill="#3fb950"/>
